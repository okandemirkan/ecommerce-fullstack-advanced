name: ecommerce-fullstack

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ECommerceDB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-ECommerceDB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      Database__ApplyMigrations: "true"
      DemoWorkspace__LifetimeMinutes: ${DEMO_WORKSPACE_LIFETIME_MINUTES:-30}
      DataProtection__KeysPath: /var/lib/ecommerce/dataprotection
      Security__UseHttpsRedirection: "false"
      ConnectionStrings__DefaultConnection: "User ID=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Host=db;Port=5432;Database=${POSTGRES_DB:-ECommerceDB};Pooling=true;"
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-ECommerceApi}
      Jwt__Audience: ${JWT_AUDIENCE:-ECommerceUsers}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_IN_MINUTES:-240}
      LUCKYPENNY_LICENSE_KEY: ${LUCKYPENNY_LICENSE_KEY:-}
    expose:
      - "8080"
    networks:
      - app-network
    read_only: true
    volumes:
      - dataprotection-keys:/var/lib/ecommerce/dataprotection
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    init: true
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-3000}:8080"
    networks:
      - app-network
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  dataprotection-keys:

networks:
  app-network:
    driver: bridge
